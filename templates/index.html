<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评页面</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">
    <!-- 导航栏 -->
    <nav>
        <div>
            <div>
                <h2>DISC测评系统</h2>
            </div>
            <div>
                {% if session.user %}
                    <span>欢迎，{{ session.user }} ({{ session.role }})</span>
                    <a href="/my_records">个人记录</a>
                    {% if session.role == 'admin' %}
                        <a href="/all_records">所有记录</a>
                    {% endif %}
                    <a href="/logout">退出</a>
                {% else %}
                    <a href="/login">登录</a>
                    <a href="/register">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

<h1>测评系统</h1>
<div class="card" style="text-align: center; padding: 40px;">
    <h2>欢迎使用DISC性格测评</h2>
    <p style="margin: 20px 0; font-size: 1.1rem; color: var(--text-secondary);">
        DISC是一种行为测评工具，帮助您了解自己的性格特点和行为倾向。
    </p>
    <p style="margin: 20px 0; font-size: 1.1rem; color: var(--text-secondary);">
        测评包含{{ questions|length }}道题目，请根据您的实际情况选择最符合和最不符合的选项。
    </p>
    <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin-left: auto; margin-right: auto;">
        <a href="/test" class="btn" style="text-align: center;">开始测评</a>
        <a href="/my_records" class="btn btn-secondary" style="text-align: center;">查看历史记录</a>
    </div>
</div>

</div>
</body>
</html>
